<!DOCTYPE html>
<html dir="rtl" lang="ar" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edrak Professional Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#01449c">
     <link rel="apple-touch-icon" href="icon.png">
     <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        :root {
           --edrak-blue: #1A3668;
           --edrak-orange: #F37021;
           --soft-bg: #F0F4F8;
        }
        body {
           background-color: var(--soft-bg);
           font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
           margin: 0; padding: 0;
           height: 100vh;
           display: flex;
           flex-direction: column;
        }

        /* حاوية الصورة العلوية الثابتة */
        .header-banner {
            background: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .header-banner img {
            width: 120px; /* يمكنك التحكم في حجم الصورة من هنا */
            height: auto;
            border-radius: 15px;
        }

        /* حاوية النظام */
        .system-container {
            flex-grow: 1;
            position: relative;
            background: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* لودر التحميل */
        #globalLoader {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1200;
        }
        .loader-visual {
            width: 50px; height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--edrak-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header-banner">
    <img src="https://up6.cc/do.php?img=171086433611311" id="mainLogo" alt="Smart Payroll Logo">
</div>

<div class="system-container">
    <div id="globalLoader">
        <div class="loader-visual"></div>
        <h5 class="mt-3 fw-bold" style="color: var(--edrak-blue);">جاري تحميل النظام...</h5>
    </div>
    
    <iframe 
        id="appIframe" 
        src="https://script.google.com/macros/s/AKfycbzZiRMzKEjXlZSpIBPOoXJjHaGK70ZAq1vy0h90ExIKhEGKRgDn2QXxAVNjcPr6Yp1s/exec?authuser=0" 
        allow="geolocation">
    </iframe>
</div>

<script>
    const iframe = document.getElementById('appIframe');
    const loader = document.getElementById('globalLoader');

    // إخفاء شاشة التحميل عند اكتمال تحميل الرابط
    iframe.onload = () => {
        loader.style.display = 'none';
    };

    // معالجة خطأ التحميل إذا طال الوقت
    setTimeout(() => {
        if (loader.style.display !== 'none') {
            loader.innerHTML = '<p class="text-danger">تأخر التحميل، يرجى التحقق من الاتصال بالإنترنت</p>';
        }
    }, 15000);
</script>
<div id="installArea" style="display:none; background: #fff; padding: 10px; border-bottom: 1px solid #ddd; text-align: center;">
    <button id="installBtn" class="btn btn-primary" style="background-color: #01449c;">تثبيت تطبيق Smart Payroll على الهاتف</button>
</div>

<script>
    let deferredPrompt;
    const installArea = document.getElementById('installArea');
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        // منع المتصفح من إظهار الرسالة التلقائية فوراً
        e.preventDefault();
        deferredPrompt = e;
        // إظهار الزر الخاص بنا
        installArea.style.display = 'block';
    });

    installBtn.addEventListener('click', (e) => {
        installArea.style.display = 'none';
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
                console.log('User accepted the install prompt');
            }
            deferredPrompt = null;
        });
    });
</script>
</body>
</html>
